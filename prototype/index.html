<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#090b10" />
  <title>AlphaLabs &mdash; PM Approval Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
/* AlphaLabs PM Approval Prototype — styles (mobile-first, dark) */
:root {
  --bg: #090b10;
  --panel: #121722;
  --panel-2: #0e131c;
  --panel-line: #1e2633;
  --text: #eef3f9;
  --muted: #8a97a8;
  --muted-2: #5e6b7d;
  --green: #22c55e;
  --green-soft: #163326;
  --red: #ef4455;
  --red-soft: #321a20;
  --amber: #f5b53d;
  --blue: #5aa2ff;
  --purple: #a855f7;
  --star: #f5b53d;
  --radius: 16px;
  --radius-sm: 11px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: #05070b;
  color: var(--text);
  font-family: "Inter", -apple-system, system-ui, sans-serif;
}

/* ---------- Prototype chrome ---------- */
.proto-bar {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 18px; background: #0c1018; border-bottom: 1px solid #1a2230;
  position: sticky; top: 0; z-index: 50; flex-wrap: wrap;
}
.proto-brand { font-weight: 700; color: var(--green); font-size: 14px; letter-spacing: .2px; }
.proto-tabs { display: flex; gap: 8px; }
.proto-tab {
  background: #141b27; color: var(--muted); border: 1px solid #232d3c;
  padding: 6px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 600; cursor: pointer;
  transition: .15s;
}
.proto-tab:hover { color: var(--text); }
.proto-tab.active { background: var(--green); color: #06140c; border-color: var(--green); }
.proto-note { color: var(--muted-2); font-size: 12px; margin-left: auto; }

/* ---------- Device frame ---------- */
.stage {
  display: flex; justify-content: center; padding: 26px 16px 60px;
}
.device {
  position: relative;
  width: 412px; max-width: 100%;
  height: 860px; max-height: calc(100vh - 120px);
  background: var(--bg);
  border-radius: 38px;
  border: 10px solid #11151d;
  box-shadow: 0 24px 60px rgba(0,0,0,.6), inset 0 0 0 2px #000;
  overflow: hidden;
  transform: translateZ(0); /* containing block so fixed sheet/toast pin to device viewport */
}
.device-notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 150px; height: 24px; background: #11151d; border-radius: 0 0 16px 16px; z-index: 30;
}
.screen-host {
  position: relative; height: 100%; width: 100%;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.screen-host::-webkit-scrollbar { display: none; }

/* ---------- Shared layout ---------- */
.app-header {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 12px;
  padding: 18px 16px 10px; background: linear-gradient(#090b10, #090b10ee);
  backdrop-filter: blur(6px);
}
.app-header .icon-btn { color: var(--muted); }
.brand { display: flex; align-items: center; gap: 7px; font-weight: 800; font-size: 18px; }
.brand .logo {
  width: 22px; height: 22px; border-radius: 6px;
  background: conic-gradient(from 200deg, #22c55e, #16a34a);
  display: grid; place-items: center; color: #06140c; font-size: 13px; font-weight: 900;
}
.spacer { flex: 1; }
.icon-btn {
  background: none; border: none; color: var(--text); cursor: pointer;
  display: grid; place-items: center; width: 34px; height: 34px; border-radius: 9px;
}
.icon-btn:hover { background: #141b27; }
.bell-wrap { position: relative; }
.bell-badge {
  position: absolute; top: 2px; right: 2px; background: var(--green); color: #06140c;
  font-size: 10px; font-weight: 800; border-radius: 999px; padding: 0 4px; line-height: 14px;
}
.date-row { padding: 0 18px 12px; color: var(--muted); font-size: 13px; }
.content { padding: 0 14px 100px; display: flex; flex-direction: column; gap: 14px; }

.panel {
  background: var(--panel); border: 1px solid var(--panel-line);
  border-radius: var(--radius); padding: 14px;
}
.panel-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.panel-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .12em; color: var(--muted);
  text-transform: uppercase;
}
.section-num {
  display: inline-grid; place-items: center; width: 17px; height: 17px; border-radius: 50%;
  border: 1px solid var(--panel-line); color: var(--muted); font-size: 10px; font-weight: 700;
}
.view-all { margin-left: auto; color: var(--green); font-size: 12.5px; font-weight: 600; cursor: pointer; }

/* ---------- Brand mark / logos ---------- */
.tkr-logo {
  position: relative; overflow: hidden;
  width: 44px; height: 44px; border-radius: 11px; display: grid; place-items: center;
  font-weight: 800; font-size: 13px; color: #fff; flex: none;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
}
.tkr-logo.sm { width: 30px; height: 30px; border-radius: 8px; font-size: 11px; }
.tkr-logo.lg { width: 60px; height: 60px; border-radius: 14px; font-size: 16px; }
.tkr-init { position: absolute; inset: 0; display: grid; place-items: center; }
.tkr-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;
  background: #fff; padding: 14%; }

/* ---------- Stars ---------- */
.stars { display: inline-flex; gap: 2px; color: var(--star); font-size: 15px; line-height: 1; }
.stars .s-empty { color: #2c3543; }

/* ---------- Market regime ---------- */
.regime-top { display: flex; gap: 14px; }
.regime-gauge { flex: none; }
.regime-meta { display: flex; flex-direction: column; justify-content: center; }
.regime-label { font-size: 24px; font-weight: 800; color: var(--green); line-height: 1; }
.regime-conf { color: var(--muted); font-size: 12.5px; margin-top: 4px; }
.futures { margin-left: auto; display: grid; gap: 6px; align-content: center; min-width: 150px; }
.fut-row { display: flex; justify-content: space-between; font-size: 12.5px; gap: 12px; }
.fut-row .fn { color: var(--muted); }
.fut-row .fv { font-weight: 700; font-variant-numeric: tabular-nums; }
.up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--amber); }
.lex {
  margin-top: 12px; background: var(--panel-2); border: 1px solid var(--panel-line);
  border-radius: var(--radius-sm); padding: 11px 12px;
}
.lex-title { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 12.5px; margin-bottom: 5px; }
.lex-body { color: #cdd6e1; font-size: 12.5px; line-height: 1.5; }

/* ---------- Best opportunity hero ---------- */
.hero { border: 1px solid #25492f; box-shadow: 0 0 0 1px #16351f inset; }
.hero-top { display: flex; gap: 14px; align-items: flex-start; }
.hero-mid { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.hero-score { text-align: right; }
.score-big { font-size: 30px; font-weight: 800; line-height: 1; }
.score-big .den { font-size: 14px; color: var(--muted); font-weight: 600; }
.score-cap { font-size: 10.5px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
.tkr-name-lg { font-size: 22px; font-weight: 800; line-height: 1; }
.tkr-sub { color: var(--muted); font-size: 12px; }
.pill-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; color: var(--muted); font-size: 12.5px; }
.action-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-top: 14px; }
.btn {
  border: 1px solid var(--panel-line); background: var(--panel-2); color: var(--text);
  border-radius: 11px; padding: 11px 8px; font-size: 13px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px; min-height: 44px;
  transition: .12s;
}
.btn:active { transform: scale(.97); }
.btn-approve { background: var(--green); color: #06140c; border-color: var(--green); }
.btn-reject { background: var(--red-soft); color: var(--red); border-color: #4a2730; }
.btn-reject.solid { background: var(--red); color: #fff; border-color: var(--red); }
.btn-watch { background: var(--panel-2); color: var(--amber); border-color: #45381c; }
.btn-explain { background: #15243b; color: var(--blue); border-color: #24405f; }
.btn-ghost { color: var(--blue); }
.btn-icon-only { flex: none; width: 48px; }

/* ---------- Top 5 list ---------- */
.opp-row {
  display: flex; align-items: center; gap: 11px; padding: 9px 6px; border-radius: 11px; cursor: pointer;
}
.opp-row:hover { background: var(--panel-2); }
.opp-rank { width: 14px; color: var(--muted-2); font-weight: 700; font-size: 13px; }
.opp-id { display: flex; align-items: center; gap: 9px; min-width: 0; }
.opp-tkr { font-weight: 800; font-size: 13.5px; }
.opp-name { color: var(--muted); font-size: 11.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 96px; }
.opp-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.opp-score { font-weight: 800; font-size: 14px; font-variant-numeric: tabular-nums; width: 26px; text-align: right; }
.divline { height: 1px; background: var(--panel-line); margin: 2px 0; }

/* ---------- mini grid cards ---------- */
.mini-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.mini { padding: 12px; }
.mini .panel-eyebrow { font-size: 10px; line-height: 1.3; display: block; margin-bottom: 8px; }
.mini-big { font-size: 30px; font-weight: 800; line-height: 1; }
.wl-line { display: flex; align-items: center; gap: 6px; font-size: 13px; margin: 3px 0; }
.kv { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 5px; }
.risk-list { margin: 0; padding-left: 16px; color: #cdd6e1; font-size: 12px; line-height: 1.7; }
.exposure-row { display: flex; align-items: center; gap: 4px; font-size: 11.5px; margin: 2px 0; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.exp-pct { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; }

/* ---------- Bottom nav ---------- */
/* fixed so it pins to the device viewport (the .device transform is its
   containing block) instead of scrolling away with the content */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
  display: grid; grid-template-columns: repeat(5, 1fr);
  background: #0b0f16f5; backdrop-filter: blur(10px); border-top: 1px solid var(--panel-line);
  padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
}
.bottom-spacer { height: 88px; }
.tab {
  background: none; border: none; cursor: pointer; color: var(--muted-2);
  display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10.5px; font-weight: 600;
}
.tab.active { color: var(--green); }
.tab svg { width: 21px; height: 21px; }

/* ---------- Detail screen (B) ---------- */
.detail-head {
  position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 8px;
  padding: 16px 12px 12px; background: linear-gradient(#090b10, #090b10ee); backdrop-filter: blur(6px);
}
.detail-title { font-weight: 800; font-size: 17px; }
.back-btn { display: flex; align-items: center; gap: 4px; color: var(--text); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.det-id-row { display: flex; gap: 14px; align-items: center; padding: 2px 4px 4px; }
.det-id-meta { flex: 1; min-width: 0; }
.det-name { font-size: 19px; font-weight: 800; }
.det-chips { color: var(--muted); font-size: 12px; margin-top: 2px; }
.dir-row { margin-top: 6px; font-size: 13px; }
.badge-dir { font-weight: 800; }
.badge-dir.long { color: var(--green); } .badge-dir.short { color: var(--red); }
.chip {
  display: inline-block; background: var(--panel-2); border: 1px solid var(--panel-line);
  border-radius: 999px; padding: 3px 9px; font-size: 11.5px; color: #cdd6e1; font-weight: 600;
}
.metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); }
.metric { text-align: left; padding: 4px 10px; border-left: 1px solid var(--panel-line); }
.metric:first-child { border-left: none; }
.metric .ml { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.metric .mv { font-weight: 800; font-size: 15px; margin-top: 3px; }

.bullbear { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.bb-col h4 { margin: 0 0 8px; font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; }
.bb-col.bull h4 { color: var(--green); }
.bb-col.bear h4 { color: var(--red); }
.bb-list { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 7px; }
.bb-list li { font-size: 12.5px; color: #d3dbe5; display: flex; gap: 7px; align-items: flex-start; line-height: 1.35; }
.bb-list.bull li::before { content: "✓"; color: var(--green); font-weight: 800; }
.bb-list.bear li::before { content: "•"; color: var(--red); font-weight: 800; }

.why-body { color: #cdd6e1; font-size: 13px; line-height: 1.55; }

.evidence-list { display: flex; flex-direction: column; gap: 11px; }
.ev-row { display: grid; grid-template-columns: 150px 1fr 40px; align-items: center; gap: 10px; }
.ev-label { font-size: 12.5px; color: #cfd7e2; display: flex; align-items: center; gap: 7px; }
.ev-bar { height: 7px; background: #1b2331; border-radius: 999px; overflow: hidden; }
.ev-fill { height: 100%; border-radius: 999px; }
.ev-pct { font-size: 12.5px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
.ev-dot { width: 14px; height: 14px; color: var(--muted); }

.chips-wrap { display: flex; flex-wrap: wrap; gap: 7px; }

.hist-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.hist-card { background: var(--panel-2); border: 1px solid var(--panel-line); border-radius: 12px; padding: 10px; }
.hist-label { font-size: 11px; color: #cdd6e1; line-height: 1.3; min-height: 28px; }
.hist-ret { font-weight: 800; font-size: 14px; margin-top: 6px; }

.ai-list { margin: 0; padding-left: 18px; color: #d3dbe5; font-size: 13px; line-height: 1.7; }
.prob-line { margin-top: 10px; font-size: 13px; font-weight: 600; }
.prob-line b { color: var(--green); }

.sticky-actions {
  position: sticky; bottom: 0; z-index: 22; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px;
  padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
  background: #0b0f16f5; backdrop-filter: blur(10px); border-top: 1px solid var(--panel-line);
}
.sticky-actions .btn { padding: 11px 4px; font-size: 12px; gap: 5px; min-width: 0; }
.sticky-actions .btn svg { width: 15px; height: 15px; flex: none; }

/* ---------- Approval queue (C) ---------- */
.queue-head { padding: 16px 16px 6px; display: flex; align-items: center; gap: 8px; }
.queue-title { font-weight: 800; font-size: 17px; display: flex; align-items: center; gap: 7px; }
.queue-progress { padding: 6px 18px 4px; }
.qp-top { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 7px; }
.qp-top b { color: var(--text); }
.qp-bar { height: 6px; background: #1b2331; border-radius: 999px; overflow: hidden; }
.qp-fill { height: 100%; background: var(--green); border-radius: 999px; transition: width .3s; }

.queue-screen {
  display: flex; flex-direction: column; height: 100%;
  padding-bottom: calc(60px + env(safe-area-inset-bottom)); /* clear fixed tabbar */
}
.swipe-area { position: relative; padding: 12px 14px; flex: 1 1 auto; min-height: 0; }
.swipe-stack { position: relative; height: 100%; }
.q-card {
  position: absolute; inset: 0;
  background: var(--panel); border: 1px solid var(--panel-line); border-radius: 20px; padding: 14px;
  display: flex; flex-direction: column; gap: 9px;
  box-shadow: 0 18px 40px rgba(0,0,0,.5);
  transition: transform .35s cubic-bezier(.2,.7,.3,1), opacity .35s;
  cursor: pointer;
}
.q-card.behind-1 { transform: scale(.94) translateY(14px); opacity: .55; z-index: 1; }
.q-card.behind-2 { transform: scale(.88) translateY(28px); opacity: .3; z-index: 0; }
.q-card.front { z-index: 3; }
.q-card.leaving-right { transform: translateX(120%) rotate(8deg); opacity: 0; }
.q-card.leaving-left { transform: translateX(-120%) rotate(-8deg); opacity: 0; }
.q-card.leaving-up { transform: translateY(-120%); opacity: 0; }
.q-top { display: flex; justify-content: space-between; align-items: center; }
.q-dir { font-size: 12px; font-weight: 800; letter-spacing: .08em; }
.q-id { display: flex; gap: 12px; align-items: center; }
.q-name { font-size: 22px; font-weight: 800; line-height: 1; }
.q-sub { color: var(--muted); font-size: 12.5px; }
.q-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.q-metric { background: var(--panel-2); border: 1px solid var(--panel-line); border-radius: 12px; padding: 8px 10px; }
.q-metric .ml { font-size: 11px; color: var(--muted); }
.q-metric .mv { font-size: 16px; font-weight: 800; margin-top: 2px; }
.q-chips { display: flex; gap: 8px; }
.q-reasons-title { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.q-reason { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 3px 0; }
.q-mini-ev { display: flex; gap: 14px; font-size: 12px; color: var(--muted); margin-top: auto; padding-top: 6px; border-top: 1px solid var(--panel-line); }
.q-mini-ev b { color: var(--text); }

.swipe-actions { display: flex; justify-content: center; gap: 30px; padding: 10px 0 8px; flex: none; }
.swipe-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 600; }
.swipe-circle { width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; border: 2px solid; transition: .12s; }
.swipe-btn:active .swipe-circle { transform: scale(.9); }
.sc-reject { border-color: var(--red); color: var(--red); }
.sc-watch { border-color: var(--amber); color: var(--amber); }
.sc-approve { border-color: var(--green); color: var(--green); }
.next-up { display: flex; align-items: center; gap: 8px; padding: 9px 16px; border-top: 1px solid var(--panel-line); font-size: 12.5px; color: var(--muted); flex: none; }
.next-up b { color: var(--text); }
.queue-done { text-align: center; padding: 60px 24px; color: var(--muted); }
.queue-done .big { font-size: 44px; }

/* ---------- Explain sheet (D) ---------- */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 40; background: rgba(2,4,8,.6);
  display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }
.sheet {
  width: 100%; max-height: 92%; background: var(--bg);
  border-radius: 22px 22px 0 0; border-top: 1px solid var(--panel-line);
  transform: translateY(100%); transition: transform .3s cubic-bezier(.2,.7,.3,1);
  display: flex; flex-direction: column; overflow: hidden;
}
.sheet-backdrop.open .sheet { transform: translateY(0); }
.sheet-grab { width: 40px; height: 4px; border-radius: 999px; background: #2c3645; margin: 10px auto 6px; }
.sheet-head { display: flex; align-items: center; gap: 12px; padding: 6px 16px 12px; }
.sheet-scroll { overflow-y: auto; padding: 0 16px 16px; scrollbar-width: none; }
.sheet-scroll::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 16px; border-bottom: 1px solid var(--panel-line); padding: 0 16px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; padding: 12px 0; cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.sheet-section-title { font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: 18px 0 10px; }
.follow-up { display: flex; gap: 8px; margin-top: 8px; }
.follow-up input {
  flex: 1; background: var(--panel); border: 1px solid var(--panel-line); border-radius: 12px;
  padding: 12px 14px; color: var(--text); font-size: 13px; font-family: inherit;
}
.follow-up input::placeholder { color: var(--muted-2); }
.fu-send { width: 46px; border-radius: 12px; background: #15243b; border: 1px solid #24405f; color: var(--blue); cursor: pointer; display: grid; place-items: center; }
.disclaimer { text-align: center; color: var(--muted-2); font-size: 11.5px; margin: 16px 0 10px; }
.sheet-close { margin: 0 16px 16px; padding: 14px; border-radius: 14px; background: var(--panel); border: 1px solid var(--panel-line); color: var(--text); font-weight: 700; font-size: 14px; cursor: pointer; }

/* toast for prototype feedback on decisions */
.toast {
  position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(20px);
  background: #16351f; border: 1px solid #2a5a36; color: #b7f5cd; padding: 10px 16px; border-radius: 12px;
  font-size: 13px; font-weight: 600; z-index: 60; opacity: 0; transition: .25s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

              ${stars(hs.star_rating)} <span style="font-weight:800">${hs.conviction_score != null ? hs.conviction_score : "—"}</span>
              ${hs.expected_move_text ? `<div class="down" style="font-weight:700;margin-top:4px">${esc(hs.expected_move_text)}</div>` : ""}`

          <section class="panel mini">
            <span class="panel-eyebrow"><span class="section-num">6</span> Highest Conviction Long</span>
            ${hl ? `
              <div style="font-weight:800;margin:6px 0 2px">🔺 ${esc(hl.ticker)}</div>
              ${stars(hl.star_rating)} <span style="font-weight:800">${hl.conviction_score != null ? hl.conviction_score : "—"}</span>
              ${hl.expected_move_text ? `<div class="up" style="font-weight:700;margin-top:4px">${esc(hl.expected_move_text)}</div>` : ""}`
            : `<div class="empty-note" style="margin-top:8px">No high-conviction long today.</div>`}

        <div class="mini-grid">
          <section class="panel mini">
            <span class="panel-eyebrow"><span class="section-num">7</span> Market Risks</span>

          </section>
          <section class="panel mini">
            <span class="panel-eyebrow"><span class="section-num">8</span> Portfolio Exposure ${exp.freshness && exp.freshness.is_stale ? `<span class="meta-chip stale">${esc(exp.freshness.label)}</span>` : ""}</span>
            ${exp.segments && exp.segments.length
              ? `<div style="display:flex;gap:8px;align-items:center;margin-top:4px">
                  ${donut(exp.segments)}
                  <div style="flex:1">
                    ${exp.segments.map((e) => `<div class="exposure-row"><span class="dot" style="background:${e.color}"></span>${esc(e.label)}<span class="exp-pct">${e.pct}%</span></div>`).join("")}
                  </div>
                </div>`
              : `<div class="empty-note" style="margin-top:8px">${esc(exp.note || "Not available yet.")}</div>`}
          </section>
          <section class="panel mini" data-goto-queue>
            <span class="panel-eyebrow"><span class="section-num">9</span> Pending Approvals</span>
            <div class="mini-big">${pa.total}</div>
            <div class="kv"><span>High Conviction</span><b style="color:var(--green)">${pa.high_conviction}</b></div>
            <div class="kv"><span>Needs Review</span><b>${pa.needs_review}</b></div>
          </section>
        </div>

      </div>
      ${tabbar("brief")}
    `;
  }

  /* ---------------- Screen B: Opportunity Detail ---------------- */
  function confidenceRows(sources) {
    return sources.map((s) => {
      const unavailable = s.score === null;
      const fillStyle = unavailable
        ? "width:100%;background:#222a36"
        : `width:${s.score}%;background:${evColor(s.score)}`;
      return `
        <div class="ev-row ${unavailable ? "ev-unavailable" : ""}">
          <span class="ev-label">${esc(s.label)}</span>
          <span class="ev-bar"><span class="ev-fill" style="${fillStyle}"></span></span>
          <span class="ev-pct">${esc(s.score_text)}</span>
        </div>
        ${unavailable && s.note ? `<div class="ev-note">${esc(s.note)}</div>` : ""}`;
    }).join("");
  }

  function historicalBlock(hs) {
    if (!hs || hs.status === "not_available") {
      return `<div class="empty-note">Historical similarity matching isn't available yet for this setup.</div>`;
    }
    return `
      ${hs.summary_text ? `<p class="why-body" style="margin-bottom:10px">${esc(hs.summary_text)}</p>` : ""}
      <div class="hist-grid">${hs.setups.map((h) => `
        <div class="hist-card">
          <div class="hist-label">${esc(h.label)}</div>
          ${sparkline([3,5,4,7,6,9,12], h.positive ? "#22c55e" : "#ef4455", 64, 24)}
          <div class="hist-ret ${h.positive ? "up" : "down"}">${esc(h.return_text)}</div>
        </div>`).join("")}</div>`;
  }

  function renderDetail() {
    // Screen B is NOT wired to live data. When the opportunity came from a live
    // Screen-A card that has no mock counterpart, show an honest placeholder
    // rather than faking detail data.
    if (state.detailPlaceholder) {
      return `
        <header class="detail-head">
          <button class="back-btn" data-goto="brief">‹ Back</button>
          <span class="spacer"></span><span class="detail-title">Opportunity</span><span class="spacer"></span>
        </header>
        <div class="content"><div class="empty-note" style="margin-top:60px">
          Live detail endpoint not implemented yet. Opportunity detail is only available in mock mode.
        </div></div>${tabbar("opp")}`;
    }
    const d = detail(state.currentOppId);
    if (!d) return `<div class="content"><div class="empty-note" style="margin-top:60px">Opportunity not found.</div></div>${tabbar("opp")}`;
    const hd = d.header, c = d.conviction, t = d.thesis, ai = d.ai_explanation;

    return `
      <header class="detail-head">
        <button class="back-btn" data-goto="brief">‹ Back</button>
        <span class="spacer"></span>
        <span class="detail-title">${esc(hd.ticker)}</span>
        <span class="spacer"></span>
        <button class="icon-btn">${ICN.star}</button>
        <button class="icon-btn">${ICN.dots}</button>
      </header>
      <div class="content" style="padding-bottom:24px">

        <div class="det-id-row">
          ${logo(hd, "")}
          <div class="det-id-meta">
            <div class="det-name">${esc(hd.name)}</div>
            <div class="det-chips">${esc(hd.ticker)} · ${hd.chips.map(esc).join(" · ")}</div>
            <div class="dir-row">Direction: <span class="badge-dir ${hd.direction === "LONG" ? "long" : "short"}">${hd.direction} ${hd.direction === "LONG" ? "↑" : "↓"}</span> &nbsp; <span class="chip">${esc(hd.strategy)}</span></div>
          </div>
          ${gauge(c.score, 78)}
        </div>

        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">Conviction Trend (7 Days)</span><span class="view-all" style="cursor:default">${esc(c.trend_text)} ${c.trend_direction === "up" ? "↗" : c.trend_direction === "down" ? "↘" : "→"}</span></div>
          ${lineChart(c.trend_series, c.trend_labels)}
        </section>

        <section class="panel" style="padding:0">
          <div class="metrics-row">
            <div class="metric"><div class="ml">Expected Move</div><div class="mv up">${esc(c.expected_move_text)}</div></div>
            <div class="metric"><div class="ml">Risk Level</div><div class="mv" style="color:var(--amber)">${esc(c.risk_level)}</div></div>
            <div class="metric"><div class="ml">Hold Period</div><div class="mv">${esc(c.hold_period_text)}</div></div>
            <div class="metric"><div class="ml">Win Prob</div><div class="mv">${c.win_probability}%</div></div>
          </div>
        </section>

        <section class="panel">
          <div class="bullbear">
            <div class="bb-col bull"><h4>Bull Case</h4><ul class="bb-list bull">${t.bull_case.map((x) => `<li>${esc(x)}</li>`).join("")}</ul></div>
            <div class="bb-col bear"><h4>Bear Case</h4><ul class="bb-list bear">${t.bear_case.map((x) => `<li>${esc(x)}</li>`).join("")}</ul></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">Why This Matters</span></div>
          <div class="why-body">${esc(t.why_this_matters)}</div>
        </section>

        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">Confidence Breakdown</span></div>
          <div class="evidence-list">${confidenceRows(d.confidence_breakdown)}</div>
        </section>

        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">Supporting Evidence</span></div>
          <div class="chips-wrap">${d.supporting_evidence.map((s) => `<span class="chip">${esc(s.label)}</span>`).join("")}</div>
        </section>

        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">Historical Similar Setups</span></div>
          ${historicalBlock(d.historical_setups)}
        </section>

        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">AI Explanation</span></div>
          <ul class="ai-list">${ai.bullets.map((x) => `<li>${esc(x)}</li>`).join("")}</ul>
          <div class="prob-line">Estimated probability of success: <b>${ai.probability}%</b></div>
        </section>

        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">Key Risks</span></div>
          <ul class="risk-list">${d.key_risks.map((x) => `<li>${esc(x)}</li>`).join("")}</ul>
        </section>

        ${d.source_refs && d.source_refs.length ? `
        <section class="panel">
          <div class="panel-head"><span class="panel-eyebrow">Sources</span></div>
          <div class="chips-wrap">${d.source_refs.map((s) => `<span class="chip src">${esc(s.label)}</span>`).join("")}</div>
        </section>` : ""}

      </div>
    `;
  }

  /* ---------------- Screen C: Approval Queue ---------------- */
  function renderQueue() {
    // Screen C is NOT wired to live data. In live mode, show an honest
    // placeholder instead of mixing the mock approval cards with the live
    // pending counts from Screen A.
    if (dataMode === "live") {
      return `
        ${queueHeader(0, B.pending_approvals.total, 0)}
        <div class="queue-done">
          <div class="big">🚧</div>
          <h3>Approval queue unavailable in live mode</h3>
          <p>Live approval queue is not implemented yet. Screen A is using live briefing data only.</p>
          <button class="btn btn-explain" data-goto="brief" style="display:inline-flex;margin-top:10px">Back to Brief</button>
        </div>
        <div class="bottom-spacer"></div>
        ${tabbar("watch")}`;
    }
    const total = B.pending_approvals.total;
    const reviewed = state.queueIndex;
    const pct = Math.round((reviewed / total) * 100);
    const order = state.queueOrder;
    const idx = state.queueIndex;

    if (idx >= order.length) {
      return `
        ${queueHeader(reviewed, total, pct)}
        <div class="queue-done">
          <div class="big">🎉</div>
          <h3>Queue cleared for this batch</h3>
          <p>You reviewed ${order.length} candidates. ${total - order.length} lower-priority items remain in Needs Review.</p>
          <button class="btn btn-explain" data-goto="brief" style="display:inline-flex;margin-top:10px">Back to Brief</button>
        </div>
        <div class="bottom-spacer"></div>
        ${tabbar("watch")}`;
    }

    const cards = order.slice(idx, idx + 3).map((id, i) => {
      const d = detail(id);
      const c = d.conviction, hd = d.header;
      const find = (k) => d.confidence_breakdown.find((s) => s.key === k);
      const cls = i === 0 ? "front" : i === 1 ? "behind-1" : "behind-2";
      return `
        <div class="q-card ${cls}" data-card-idx="${i}" ${i === 0 ? `data-open-detail="${id}"` : ""}>
          <div class="q-top">
            <span class="q-dir ${hd.direction === "LONG" ? "up" : "down"}">${hd.direction}</span>
            <span class="score-big" style="font-size:20px">${c.score}<span class="den">/100</span></span>
          </div>
          <div class="q-id">${logo(hd, "")}<div><div class="q-name">${esc(hd.ticker)}</div><div class="q-sub">${esc(hd.name)}</div></div></div>
          <div>${stars(c.star_rating)}</div>
          <div class="q-metrics">
            <div class="q-metric"><div class="ml">Expected Move</div><div class="mv up">${esc(c.expected_move_text)}</div></div>
            <div class="q-metric"><div class="ml">Win Probability</div><div class="mv">${c.win_probability}%</div></div>
          </div>
          ${sparkline(c.trend_series, "#22c55e", 320, 46)}
          <div class="q-chips"><span class="chip">${esc(hd.strategy)}</span><span class="chip">${esc(c.hold_period_text)}</span></div>
          <div>
            <div class="q-reasons-title">Top Reasons</div>
            ${d.thesis.bull_case.slice(0, 3).map((rs) => `<div class="q-reason">✅ ${esc(rs)}</div>`).join("")}
          </div>
          <div class="q-mini-ev">
            <span>News <b>${find("news").score_text}</b></span>
            <span>SEC <b>${find("sec").score_text}</b></span>
            <span>Hist <b>${find("historical_similarity").score_text}</b></span>
          </div>
        </div>`;
    }).reverse().join("");

    const nextId = order[idx + 1];
    const next = nextId ? detail(nextId) : null;
    // Drive the swipe buttons from the front card's action metadata.
    const frontActions = detail(order[idx]).actions;
    const act = (name) => frontActions.find((a) => a.action === name) || { enabled: false };

    return `
      <div class="queue-screen">
        ${queueHeader(reviewed, total, pct)}
        <div class="swipe-area"><div class="swipe-stack">${cards}</div></div>
        <div class="swipe-actions">
          ${swipeBtn("reject", "Reject", "sc-reject", ICN.x, act("reject"))}
          ${swipeBtn("watchlist", "Watchlist", "sc-watch", ICN.starline, act("watchlist"))}
          ${swipeBtn("approve", "Approve", "sc-approve", ICN.check, act("approve"))}
        </div>
        ${next ? `<div class="next-up">NEXT: <b>${esc(next.header.ticker)}</b> ${esc(next.header.name)} <span class="spacer" style="flex:1"></span> ${next.conviction.score}/100</div>` : ""}
      </div>
      ${tabbar("watch")}
    `;
  }

  function swipeBtn(action, label, circleCls, icon, meta) {
    const disabled = !meta.enabled;
    return `<button class="swipe-btn ${disabled ? "disabled" : ""}" data-swipe="${action}"
      data-enabled="${meta.enabled}" data-endpoint="${meta.endpoint || ""}"
      ${meta.unavailable_reason ? `title="${esc(meta.unavailable_reason)}"` : ""}>
      <span class="swipe-circle ${circleCls}">${icon}</span>${label}</button>`;
  }

  function queueHeader(reviewed, total, pct) {
    return `
      <div class="queue-head">
        <button class="back-btn" data-goto="brief">‹</button>
        <span class="queue-title">Approval Queue ${ICN.info}</span>
        <span class="spacer"></span>
        <button class="icon-btn">${ICN.filter}</button>
      </div>
      <div class="queue-progress">
        <div class="qp-top"><span><b>${reviewed}</b> / ${total} Reviewed</span><span>${pct}%</span></div>
        <div class="qp-bar"><div class="qp-fill" style="width:${pct}%"></div></div>
      </div>`;
  }

  /* ---------------- Screen D: Explain sheet ---------------- */
  // Static illustrative talking points per source (the API note carries the
  // honest availability message; these bullets are presentation flavor).
  const SOURCE_POINTS = {
    news: ["Analyst upgrades and positive coverage in last 48h", "Partnership/contract headlines driving sentiment", "Elevated news volume vs. 30-day baseline"],
    sec: ["Recent 8-K disclosures reviewed", "No adverse insider-selling clusters detected", "Backlog/guidance language constructive"],
    options: ["Call/put ratio skewed bullish", "Unusual call sweeps near-dated", "Rising open interest at higher strikes"],
    technicals: ["Above rising 20/50-day moving averages", "Relative strength vs. sector positive", "Approaching prior resistance — watch for breakout"],
    macro: ["Regime supportive (risk-on)", "Rate path neutral-to-dovish", "Liquidity conditions stable"],
  };

  function explainSheet() {
    const d = detail(state.sheet.oppId);
    const tabs = [["ai", "AI Explanation"], ["news", "News"], ["sec", "SEC"], ["options", "Options"], ["technicals", "Techs"], ["macro", "Macro"]];
    const body = explainTabBody(d, state.sheet.tab);
    return `
      <div class="sheet-backdrop ${state.sheet.open ? "open" : ""}" data-sheet-backdrop>
        <div class="sheet" data-stop>
          <div class="sheet-grab"></div>
          <div class="sheet-head">
            ${logo(d.header, "")}
            <div style="flex:1"><div style="font-weight:800;font-size:16px">${esc(d.header.ticker)}</div><div class="tkr-sub">${esc(d.header.name)}</div></div>
            ${gauge(d.conviction.score, 64, "")}
          </div>
          <div class="tabs">
            ${tabs.map(([k, l]) => `<button class="tab-btn ${state.sheet.tab === k ? "active" : ""}" data-sheet-tab="${k}">${l}</button>`).join("")}
          </div>
          <div class="sheet-scroll">${body}</div>
          <button class="sheet-close" data-sheet-close>Close</button>
        </div>
      </div>`;
  }

  function explainTabBody(d, tab) {
    const ai = d.ai_explanation;
    if (tab === "ai") {
      return `
        <div class="sheet-section-title">AI Explanation</div>
        <p class="why-body">${esc(d.header.name)} has one of today's highest conviction scores because multiple independent signals align:</p>
        <ul class="ai-list">${ai.bullets.map((x) => `<li>${esc(x)}</li>`).join("")}</ul>
        <div class="prob-line">Estimated probability of success: <b>${ai.probability}%</b></div>
        <div class="sheet-section-title">Historical Insight</div>
        ${historicalBlock(d.historical_setups)}
        <div class="sheet-section-title">Follow-up Question</div>
        <div class="follow-up">
          <input placeholder="Ask AlphaLabs for more detail about this opportunity…" />
          <button class="fu-send">${ICN.send}</button>
        </div>
        <div class="disclaimer">${esc(ai.disclaimer)}</div>`;
    }
    const src = d.confidence_breakdown.find((s) => s.key === tab);
    const points = SOURCE_POINTS[tab] || [];
    const unavailable = src.score === null;
    return `
      <div class="sheet-section-title">${esc(src.label)} — ${unavailable ? "unavailable" : src.score + "% confidence"}</div>
      ${unavailable
        ? `<div class="empty-note" style="margin-bottom:14px">${esc(src.note || "Not available for this symbol.")}</div>`
        : `<div class="ev-row" style="grid-template-columns:1fr 50px;margin-bottom:14px">
            <span class="ev-bar"><span class="ev-fill" style="width:${src.score}%;background:${evColor(src.score)}"></span></span>
            <span class="ev-pct">${src.score}%</span>
          </div>
          <ul class="ai-list">${points.map((p) => `<li>${esc(p)}</li>`).join("")}</ul>`}
      <div class="disclaimer">AlphaLabs AI may make mistakes. Verify before acting.</div>`;
  }

  /* ---------------- render root ---------------- */
  function render() {
    let screenHTML = "";
    if (state.screen === "brief") screenHTML = renderBrief();
    else if (state.screen === "detail") screenHTML = renderDetail();
    else if (state.screen === "queue") screenHTML = renderQueue();
    app.innerHTML = screenHTML + explainSheet() + `<div class="toast" id="toast"></div>`;
    syncProtoTabs();
  }

  function syncProtoTabs() {
    const map = { brief: "brief", detail: "detail", queue: "queue" };
    document.querySelectorAll(".proto-tab").forEach((b) => {
      b.classList.toggle("active", b.dataset.goto === (state.sheet.open ? "explain" : map[state.screen]));
    });
  }

  let toastTimer;
  function toast(msg, kind = "") {
    const t = document.getElementById("toast");
    if (!t) return;
    t.textContent = msg; t.className = "toast show " + kind;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => (t.className = "toast " + kind), 1500);
  }

  /* ---------------- actions (INERT — no network, no mutation) ---------------- */
  function openDetail(id) {
    state.currentOppId = id;
    state.screen = "detail";
    // In live mode, only mock idea_ids have detail data; everything else gets the
    // honest "not implemented" placeholder instead of faked detail.
    state.detailPlaceholder = dataMode === "live" && !R.get_opportunity(id);
    render();
    app.scrollTop = 0;
  }
  function openSheet(id) { state.sheet.oppId = id; state.sheet.open = true; state.sheet.tab = "ai"; render(); }
  function closeSheet() { state.sheet.open = false; render(); }

  // Logs the endpoint the real app WOULD call; performs no request.
  function decide(action, id, endpoint) {
    const d = detail(id);
    const tkr = d ? d.header.ticker : id;
    // eslint-disable-next-line no-console
    console.log(`[review.v1 mock] ${action} ${tkr} → would POST ${endpoint || "(no endpoint)"} (inert: no request sent)`);
    const labels = { approve: ["✓ Approved " + tkr + " (mock)", ""], reject: ["✗ Rejected " + tkr + " (mock)", "reject"], watchlist: ["☆ Watchlist " + tkr + " (mock)", "watch"] };
    const [msg, kind] = labels[action] || ["", ""];
    toast(msg, kind);
  }

  function advanceQueue(action, endpoint) {
    const id = state.queueOrder[state.queueIndex];
    const front = app.querySelector(".q-card.front");
    if (front) front.classList.add(action === "reject" ? "leaving-left" : action === "watchlist" ? "leaving-up" : "leaving-right");
    decide(action, id, endpoint);
    setTimeout(() => { state.queueIndex++; render(); }, 320);
  }

  /* ---------------- events ---------------- */
  document.addEventListener("click", (e) => {
    // prototype top switcher
    const proto = e.target.closest(".proto-tab");
    if (proto) {
      const g = proto.dataset.goto;
      if (g === "explain") { state.screen = "detail"; openSheet(state.currentOppId); }
      else { state.sheet.open = false; state.screen = g === "detail" ? "detail" : g === "queue" ? "queue" : "brief"; render(); app.scrollTop = 0; }
      return;
    }

    // sheet interactions
    if (e.target.closest("[data-sheet-close]")) return closeSheet();
    const sheetTab = e.target.closest("[data-sheet-tab]");
    if (sheetTab) { state.sheet.tab = sheetTab.dataset.sheetTab; render(); return; }
    if (e.target.closest("[data-sheet-backdrop]") && !e.target.closest("[data-stop]")) return closeSheet();

    // swipe buttons (Approval screen) — read action metadata, stay inert
    const sw = e.target.closest("[data-swipe]");
    if (sw) {
      const enabled = sw.dataset.enabled === "true";
      const action = sw.dataset.swipe;
      if (!enabled) {
        // eslint-disable-next-line no-console
        console.warn(`[review.v1 mock] ${action} is disabled (action.enabled=false) — no endpoint yet`);
        toast(action + " unavailable", "");
        return;
      }
      advanceQueue(action, sw.dataset.endpoint);
      return;
    }

    // nav: bottom tabbar
    const tab = e.target.closest("[data-tab]");
    if (tab) {
      const k = tab.dataset.tab;
      if (k === "brief") { state.screen = "brief"; render(); app.scrollTop = 0; }
      else if (k === "watch") { state.screen = "queue"; render(); app.scrollTop = 0; }
      else if (k === "opp") { openDetail(state.currentOppId); }
      else toast("'" + k + "' not in prototype");
      return;
    }

    // goto handlers
    const goto = e.target.closest("[data-goto]");
    if (goto) { state.screen = goto.dataset.goto; render(); app.scrollTop = 0; return; }
    if (e.target.closest("[data-goto-queue]")) { state.screen = "queue"; render(); app.scrollTop = 0; return; }

    // open detail (cards / rows)
    const od = e.target.closest("[data-open-detail]");
    if (od && !e.target.closest("[data-stop]")) { openDetail(Number(od.dataset.openDetail)); return; }
  });

  // Bootstrap: mock by default. In live mode, paint mock immediately (never a
  // blank screen), then attempt the read-only GET and swap in validated live
  // data — or fall back to mock with a visible warning on any failure.
  async function boot() {
    if (parseDataMode() !== "live") { dataMode = "mock"; B = R.briefing; render(); return; }
    render(); // immediate mock paint while the fetch is in flight
    try {
      const payload = await loadLiveBriefing();
      const problem = validateBriefing(payload);
      if (problem) throw new Error(problem);
      B = payload; dataMode = "live"; dataWarning = "";
    } catch (err) {
      B = R.briefing; dataMode = "mock";
      dataWarning = "Live data unavailable (" + (err && err.message ? err.message : "fetch failed") + ") — showing mock data.";
    }
    render();
  }
  boot();
})();

  </script>
</body>
</html>
